spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/couponix
    username: couponix
    password: couponix
    driver-class-name: org.postgresql.Driver

  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

geolocation:
  country-api:
    base-url: https://api.country.is
    connect-timeout-ms: 2000
    read-timeout-ms: 2000
